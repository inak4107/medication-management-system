# 캡스톤 프로젝트를 위한 Docker Compose 파일(포트번호: 5433)
services:
  db:
    image: postgres:16
    container_name: capstone-med-db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./docker-config/data:/var/lib/postgresql/data