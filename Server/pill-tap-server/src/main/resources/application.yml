spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false  #API 응답 지연 방지
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT}
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    url: /v3/api-docs
    path: /swagger-ui/index.html
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs
  packages-to-scan: pilltapserver